# Installation ownership and integrity policy for packages.yaml.

bootstrap:
  chezmoi:
    source: apt_or_github
    owner: bootstrap
    repo: twpayne/chezmoi
    integrity: upstream-checksum

core:
  fzf:
    source: external
    owner: chezmoi-external
    repo: junegunn/fzf
    integrity: pinned-sha256
  fd:
    source: apt
    owner: apt
    package: fd-find
    binary: fdfind
    integrity: apt-signature
  ripgrep:
    source: apt
    owner: apt
    package: ripgrep
    binary: rg
    integrity: apt-signature
  bat:
    source: apt
    owner: apt
    package: bat
    binary: batcat
    integrity: apt-signature
  eza:
    source: github
    owner: dotfiles-binary
    repo: eza-community/eza
    binary: eza
    integrity: pinned-sha256
    sha256_amd64: 0c38665440226cd8bef5d1d4f3bc6ff77c927fb0d68b752739105db7ab5b358d
    sha256_arm64: 366e8430225f9955c3dc659b452150c169894833ccfef455e01765e265a3edda
  lazygit:
    source: github
    owner: dotfiles-binary
    repo: jesseduffield/lazygit
    binary: lazygit
    asset_template: lazygit_{version}_linux_{arch}.tar.gz
    checksum_template: https://github.com/jesseduffield/lazygit/releases/download/{tag}/checksums.txt
    integrity: upstream-checksum
  btop:
    source: apt
    owner: apt
    package: btop
    integrity: apt-signature
  starship:
    source: github
    owner: dotfiles-binary
    repo: starship/starship
    binary: starship
    integrity: upstream-checksum
  jq:
    source: apt
    owner: apt
    package: jq
    integrity: apt-signature
  yq:
    source: apt
    owner: apt
    package: yq
    integrity: apt-signature
  htop:
    source: apt
    owner: apt
    package: htop
    integrity: apt-signature
  zoxide:
    source: apt
    owner: apt
    package: zoxide
    integrity: apt-signature
  direnv:
    source: apt
    owner: apt
    package: direnv
    integrity: apt-signature
  git-delta:
    source: apt
    owner: apt
    package: git-delta
    binary: delta
    integrity: apt-signature
  hyperfine:
    source: apt
    owner: apt
    package: hyperfine
    integrity: apt-signature
  duf:
    source: apt
    owner: apt
    package: duf
    integrity: apt-signature
  sops:
    source: github
    owner: dotfiles-binary
    repo: getsops/sops
    binary: sops
    integrity: upstream-checksum
  lazydocker:
    source: github
    owner: dotfiles-binary
    repo: jesseduffield/lazydocker
    binary: lazydocker
    integrity: upstream-checksum
  tealdeer:
    source: github
    owner: dotfiles-binary
    repo: dbrgn/tealdeer
    binary: tldr
    integrity: upstream-checksum
  curlie:
    source: github
    owner: dotfiles-binary
    repo: rs/curlie
    binary: curlie
    integrity: upstream-checksum
  trippy:
    source: github
    owner: dotfiles-binary
    repo: fujiapple852/trippy
    binary: trip
    integrity: pinned-sha256
    sha256_amd64: aa2b7b2a0773f3cc04da691100419049950b690fe3736d25e24ac955b63d6056
    sha256_arm64: 73af939aa94e9e0f07cac2b3c8177e02a6b1c3be88299d85988e02be81ae7004


languages:
  go:
    source: direct
    owner: dotfiles-runtime
    url_template: https://go.dev/dl/go{version}.linux-{arch}.tar.gz
    checksum_template: https://go.dev/dl/?mode=json&include=all
    integrity: upstream-checksum
  rust:
    source: rustup
    owner: rustup
    channel: stable
    integrity: upstream-checksum
  cargo:
    source: rustup
    owner: rustup
    channel: stable
    integrity: rustup
  node_lts:
    source: node-dist
    owner: dotfiles-runtime
    integrity: upstream-checksum
  typescript:
    source: npm
    owner: npm
    package: typescript
    binary: tsc
    integrity: npm-registry
  python:
    source: uv
    owner: uv
    integrity: uv-managed
  java:
    source: apt
    owner: apt
    package_template: openjdk-{version}-jdk-headless
    integrity: apt-signature
  uv:
    source: github
    owner: dotfiles-binary
    repo: astral-sh/uv
    binary: uv
    integrity: upstream-checksum

history:
