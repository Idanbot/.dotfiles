# External dependencies managed by chezmoi
# These are cloned/downloaded on `chezmoi apply`

".oh-my-zsh":
  type: archive
  url: "https://github.com/ohmyzsh/ohmyzsh/archive/master.tar.gz"
  exact: false
  stripComponents: 1
  refreshPeriod: 168h  # Re-download weekly

".oh-my-zsh/custom/plugins/zsh-autosuggestions":
  type: archive
  url: "https://github.com/zsh-users/zsh-autosuggestions/archive/master.tar.gz"
  exact: false
  stripComponents: 1
  refreshPeriod: 168h

".oh-my-zsh/custom/plugins/zsh-syntax-highlighting":
  type: archive
  url: "https://github.com/zsh-users/zsh-syntax-highlighting/archive/master.tar.gz"
  exact: false
  stripComponents: 1
  refreshPeriod: 168h

".oh-my-zsh/custom/plugins/fzf-tab":
  type: archive
  url: "https://github.com/Aloxaf/fzf-tab/archive/master.tar.gz"
  exact: false
  stripComponents: 1
  refreshPeriod: 168h

".oh-my-zsh/custom/plugins/you-should-use":
  type: archive
  url: "https://github.com/MichaelAquilina/zsh-you-should-use/archive/master.tar.gz"
  exact: false
  stripComponents: 1
  refreshPeriod: 168h

".tmux/plugins/tpm":
  type: archive
  url: "https://github.com/tmux-plugins/tpm/archive/master.tar.gz"
  exact: false
  stripComponents: 1
  refreshPeriod: 168h

".fzf":
  type: archive
  url: "https://github.com/junegunn/fzf/archive/master.tar.gz"
  exact: false
  stripComponents: 1
  refreshPeriod: 168h
