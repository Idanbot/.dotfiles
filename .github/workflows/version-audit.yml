name: Version Audit

on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: version-audit
  cancel-in-progress: false

jobs:
  update:
    name: Refresh verified version pins
    runs-on: ubuntu-24.04
    permissions:
      contents: write # Push the generated version-audit branch.
      pull-requests: write # Open the generated update pull request.
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install manifest tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq python3

      - name: Update verifiable pins
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./scripts/update-packages.sh --apply
          ./scripts/update-externals.sh --apply

      - name: Open update pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet; then
            echo "No updates available"
            exit 0
          fi
          branch="automation/version-audit-$(date -u +%Y%m%d)"
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git switch -c "$branch"
          git add packages.yaml packages.lock docs/tool-inventory.md .chezmoiexternal.yaml
          git commit -m "chore: refresh verified tool versions"
          gh auth setup-git
          git push --force-with-lease origin "$branch"
          gh pr create \
            --base main \
            --head "$branch" \
            --title "chore: refresh verified tool versions" \
            --body-file .version-update-report || true
