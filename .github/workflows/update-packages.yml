name: Check and Upgrade Pinned Packages

on:
  schedule:
    # Run every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  upgrade:
    name: Check for updates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run update script
        run: ./scripts/update-packages.sh

      - name: Check for changes
        id: git-check
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): upgrade pinned package versions in packages.yaml"
          title: "chore(deps): upgrade pinned package versions"
          body: |
            Automated check detected newer releases of one or more of your pinned packages.

            This PR updates the versions in `packages.yaml`.
            Please review the changes, run template validation tests, and merge if all checks pass.
          branch: auto-update-packages
          delete-branch: true
