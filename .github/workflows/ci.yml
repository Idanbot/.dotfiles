name: CI — Dotfiles Bootstrap

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        # v2.3.9 is latest; no Node 24 build yet — FORCE env var is workaround
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Add local bin to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v6
        with:
          path: |
            ~/.local/bin/shfmt
            ~/.local/bin/chezmoi
          key: bin-cache-${{ runner.os }}-${{ hashFiles('packages.yaml') }}
          restore-keys: |
            bin-cache-${{ runner.os }}-

      - name: Install linters
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck yamllint tmux zsh
          # shfmt
          if ! command -v shfmt &>/dev/null; then
            mkdir -p ~/.local/bin
            shfmt_url=https://github.com/mvdan/sh/releases/download/v3.10.0
            curl -fsSLo ~/.local/bin/shfmt \
              "$shfmt_url/shfmt_v3.10.0_linux_amd64"
            chmod +x ~/.local/bin/shfmt
          fi

      - name: shellcheck
        run: |
          echo "══ Running shellcheck ══"
          find . -name '*.sh' -print0 | \
            xargs -0 shellcheck -x -S warning -e SC1090,SC1091

      - name: shfmt
        run: |
          echo "══ Running shfmt ══"
          find . -name '*.sh' -print0 | xargs -0 shfmt -d -i 2 -ci

      - name: yamllint
        run: |
          echo "══ Running yamllint ══"
          yamllint .

      - name: Validate templates
        run: tests/test-templates.sh "$PWD"

      - name: Repository layout
        run: tests/test-repo-layout.sh

      - name: Bootstrap safety
        run: tests/test-bootstrap-safety.sh "$PWD"

      - name: Package metadata and generated docs
        run: tests/test-package-metadata.sh

      - name: Install chezmoi
        run: |
          if ! command -v chezmoi &>/dev/null; then
            mkdir -p ~/.local/bin
            sh -c "$(curl -fsLS get.chezmoi.io)" -- -b ~/.local/bin
          fi

      - name: Chezmoi apply fixture
        run: tests/test-chezmoi-apply.sh "$PWD"

      - name: Interactive startup smoke
        run: tests/test-interactive-startup.sh "$PWD"

  hadolint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: .github/workflows/Dockerfile.ubuntu-24.04
          failure-threshold: warning

  workflow-static:
    name: Workflow & Static Policy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Add local bin to PATH
        run: echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install static policy tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y jq python3
          mkdir -p ~/.local/bin
          actionlint_version=1.7.7
          actionlint_url="https://github.com/rhysd/actionlint/releases/download/v${actionlint_version}"
          curl -fsSLo /tmp/actionlint.tar.gz \
            "$actionlint_url/actionlint_${actionlint_version}_linux_amd64.tar.gz"
          tar -xzf /tmp/actionlint.tar.gz -C ~/.local/bin actionlint

      - name: actionlint
        run: actionlint

      - name: Static policy checks
        run: tests/test-static-policy.sh "$PWD"

  github-release-tools:
    name: GitHub Release Tool Smoke
    needs: [gitleaks, lint, hadolint, workflow-static]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download and smoke GitHub release tools
        run: tests/test-github-release-tools.sh "$PWD"

  install-selectors:
    name: Selector E2E (${{ matrix.profile.name }}/${{ matrix.selector.name }})
    needs: [github-release-tools]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - name: native
            wsl: "false"
          - name: wsl
            wsl: "true"
        selector:
          - name: default-full
            args: ""
            input: ""
            mode: full
            sections: detect,core,zsh,terminal,languages,cloud,tmux,neovim,ai,media,fonts,desktop,system,theme,vscode,services
            apply_scripts: "true"
          - name: base-only
            args: "--base-only"
            input: ""
            mode: base
            sections: detect,core,zsh,terminal
            apply_scripts: "false"
          - name: base-with-languages-tmux
            args: "--with languages,tmux"
            input: ""
            mode: base
            sections: detect,core,zsh,terminal,languages,tmux
            apply_scripts: "false"
          - name: base-with-ai-neovim
            args: "--with=ai,neovim"
            input: ""
            mode: base
            sections: detect,core,zsh,terminal,neovim,ai
            apply_scripts: "false"
          - name: exact-core-languages
            args: "--sections core,languages"
            input: ""
            mode: custom
            sections: core,languages
            apply_scripts: "false"
          - name: full-without-cloud-vscode
            args: "--full --without cloud,vscode"
            input: ""
            mode: full
            sections: detect,core,zsh,terminal,languages,tmux,neovim,ai,media,fonts,desktop,system,theme,services
            apply_scripts: "false"
          - name: menu-base
            args: "--menu"
            input: "2\\n"
            mode: base
            sections: detect,core,zsh,terminal
            apply_scripts: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run selector profile in Docker
        env:
          INSTALL_SELECTOR_INPUT: ${{ matrix.selector.input }}
        run: |
          docker run --rm \
            -e DOTFILES_WSL=${{ matrix.profile.wsl }} \
            -e DOTFILES_CI=true \
            -e INSTALL_SELECTOR_INPUT \
            -v ${{ github.workspace }}:/dotfiles:ro \
            ubuntu:24.04 \
            bash -lc '
              set -euo pipefail
              selector_args=()
              if [[ -n "${{ matrix.selector.args }}" ]]; then
                read -ra selector_args <<< "${{ matrix.selector.args }}"
              fi
              /dotfiles/tests/test-install-selector-profile.sh \
                "${{ matrix.selector.mode }}" \
                "${{ matrix.selector.sections }}" \
                "${{ matrix.selector.apply_scripts }}" \
                -- "${selector_args[@]}"
            '

  test:
    name: Bootstrap Test (${{ matrix.profile.name }})
    needs: [github-release-tools, install-selectors]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - name: ubuntu-24.04-native
            wsl: "false"
            dockerfile: .github/workflows/Dockerfile.ubuntu-24.04
          - name: ubuntu-24.04-wsl
            wsl: "true"
            dockerfile: .github/workflows/Dockerfile.ubuntu-24.04
          # Future distros:
          # - name: arch-latest
          #   wsl: "false"
          #   dockerfile: .github/workflows/Dockerfile.arch

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.profile.dockerfile }}
          tags: dotfiles-test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install option e2e
        run: |
          ARTIFACTS="artifacts/test-${{ matrix.profile.name }}"
          mkdir -p "$ARTIFACTS"
          docker run --rm \
            -e DOTFILES_WSL=${{ matrix.profile.wsl }} \
            -e DOTFILES_CI=true \
            -e DOTFILES_LOG_DIR=/artifacts \
            -v ${{ github.workspace }}:/dotfiles:ro \
            -v ${{ github.workspace }}/$ARTIFACTS:/artifacts \
            dotfiles-test \
            bash -lc '
              set -o pipefail
              env | sort > /artifacts/install-options-env.txt
              /dotfiles/tests/test-install-options.sh \
                2>&1 | tee /artifacts/install-options.log
            '

      - name: Chezmoi apply fixture
        run: |
          ARTIFACTS="artifacts/test-${{ matrix.profile.name }}"
          mkdir -p "$ARTIFACTS"
          docker run --rm \
            -e DOTFILES_WSL=${{ matrix.profile.wsl }} \
            -e DOTFILES_CI=true \
            -e DOTFILES_LOG_DIR=/artifacts \
            -v ${{ github.workspace }}:/dotfiles:ro \
            -v ${{ github.workspace }}/$ARTIFACTS:/artifacts \
            dotfiles-test \
            bash -lc '
              set -o pipefail
              env | sort > /artifacts/chezmoi-env.txt
              {
                mkdir -p ~/.local/bin &&
                sh -c "$(curl -fsLS get.chezmoi.io)" \
                  -- -b ~/.local/bin &&
                /dotfiles/tests/test-chezmoi-apply.sh /dotfiles
              } 2>&1 | tee /artifacts/chezmoi-apply.log
              find "$HOME" -maxdepth 3 -type f \
                | sort > /artifacts/home-files.txt
            '

      - name: Run bootstrap test
        run: |
          ARTIFACTS="artifacts/bootstrap-${{ matrix.profile.name }}"
          mkdir -p "$ARTIFACTS"
          docker run --rm \
            -e DOTFILES_WSL=${{ matrix.profile.wsl }} \
            -e DOTFILES_CI=true \
            -e DOTFILES_LOG_DIR=/artifacts \
            -v ${{ github.workspace }}:/dotfiles:ro \
            -v ${{ github.workspace }}/$ARTIFACTS:/artifacts \
            dotfiles-test \
            bash -lc '
              set -o pipefail
              env | sort > /artifacts/bootstrap-env.txt
              /dotfiles/tests/test-bootstrap.sh \
                2>&1 | tee /artifacts/bootstrap.log
              find "$HOME" -maxdepth 3 -type f \
                | sort > /artifacts/home-files-after-bootstrap.txt
            '

      - name: Run idempotency test
        run: |
          ARTIFACTS="artifacts/idempotency-${{ matrix.profile.name }}"
          mkdir -p "$ARTIFACTS"
          docker run --rm \
            -e DOTFILES_WSL=${{ matrix.profile.wsl }} \
            -e DOTFILES_CI=true \
            -e DOTFILES_LOG_DIR=/artifacts \
            -v ${{ github.workspace }}/$ARTIFACTS:/artifacts \
            -v ${{ github.workspace }}:/dotfiles:ro \
            dotfiles-test \
            bash -lc '
              set -o pipefail
              env | sort > /artifacts/idempotency-env.txt
              /dotfiles/tests/test-idempotency.sh \
                2>&1 | tee /artifacts/idempotency.log
              find "$HOME" -maxdepth 3 -type f \
                | sort > /artifacts/home-files-after-idempotency.txt
            '

      - name: Upload bootstrap logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: bootstrap-logs-${{ matrix.profile.name }}
          path: artifacts/
          if-no-files-found: ignore
