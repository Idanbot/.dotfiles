name: CI — Dotfiles Bootstrap

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install linters
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck yamllint
          # shfmt
          GOBIN=/usr/local/bin go install mvdan.cc/sh/v3/cmd/shfmt@latest || {
            shfmt_url=https://github.com/mvdan/sh/releases/latest/download
            curl -fsSLo /usr/local/bin/shfmt \
              "$shfmt_url/shfmt_v3.10.0_linux_amd64"
            chmod +x /usr/local/bin/shfmt
          }

      - name: shellcheck
        run: |
          echo "══ Running shellcheck ══"
          find . -name '*.sh' -o -name '*.sh.tmpl' | while read -r f; do
            # Strip chezmoi template directives for shellcheck
            cleaned=$(mktemp)
            sed -E '/^#\s*\{\{/d; s/\{\{[^}]*\}\}//g' "$f" > "$cleaned"
            echo "Checking: $f"
            shellcheck -x -S warning "$cleaned" || true
            rm -f "$cleaned"
          done

      - name: shfmt
        run: |
          echo "══ Running shfmt ══"
          find . -name '*.sh' | xargs shfmt -d -i 2 -ci || true

      - name: yamllint
        run: |
          echo "══ Running yamllint ══"
          yamllint -d relaxed . || true

      - name: Validate templates
        run: |
          echo "══ Validating chezmoi templates ══"
          # Check that all .tmpl files have valid Go template syntax
          find . -name '*.tmpl' | while read -r f; do
            echo "Validating: $f"
            # Basic syntax check: ensure {{ }} are balanced
            opens=$(grep -oP '\{\{' "$f" | wc -l)
            closes=$(grep -oP '\}\}' "$f" | wc -l)
            if [[ "$opens" -ne "$closes" ]]; then
              echo "ERROR: Unbalanced template delimiters in $f"
              echo "{{ = $opens, }} = $closes"
              exit 1
            fi
          done
          echo "All templates valid"

      - name: Repository layout
        run: tests/test-repo-layout.sh

  hadolint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: .github/workflows/Dockerfile.ubuntu-24.04
          failure-threshold: warning

  test:
    name: Bootstrap Test (${{ matrix.profile.name }})
    needs: [lint, hadolint]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - name: ubuntu-24.04-native
            wsl: "false"
            dockerfile: .github/workflows/Dockerfile.ubuntu-24.04
          - name: ubuntu-24.04-wsl
            wsl: "true"
            dockerfile: .github/workflows/Dockerfile.ubuntu-24.04
          # Future distros:
          # - name: arch-latest
          #   wsl: "false"
          #   dockerfile: .github/workflows/Dockerfile.arch

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build test container
        run: |
          docker build \
            -f "${{ matrix.profile.dockerfile }}" \
            -t dotfiles-test \
            .

      - name: Run bootstrap test
        run: |
          docker run --rm \
            -e DOTFILES_WSL=${{ matrix.profile.wsl }} \
            -e DOTFILES_CI=true \
            -v ${{ github.workspace }}:/dotfiles:ro \
            dotfiles-test \
            /dotfiles/tests/test-bootstrap.sh

      - name: Run idempotency test
        run: |
          docker run --rm \
            -e DOTFILES_WSL=${{ matrix.profile.wsl }} \
            -e DOTFILES_CI=true \
            -v ${{ github.workspace }}:/dotfiles:ro \
            dotfiles-test \
            /dotfiles/tests/test-idempotency.sh
