name: CI — Dotfiles Bootstrap

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Add local bin to PATH
        run: echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Cache binaries
        id: cache-binaries
        uses: actions/cache@v5
        with:
          path: |
            ~/.local/bin/shfmt
            ~/.local/bin/chezmoi
          key: bin-cache-${{ runner.os }}-${{ hashFiles('packages.yaml') }}
          restore-keys: |
            bin-cache-${{ runner.os }}-

      - name: Install linters
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck yamllint tmux zsh
          # shfmt
          if ! command -v shfmt &>/dev/null; then
            mkdir -p ~/.local/bin
            shfmt_url=https://github.com/mvdan/sh/releases/latest/download
            curl -fsSLo ~/.local/bin/shfmt \
              "$shfmt_url/shfmt_v3.10.0_linux_amd64"
            chmod +x ~/.local/bin/shfmt
          fi

      - name: shellcheck
        run: |
          echo "══ Running shellcheck ══"
          find . -name '*.sh' -print0 | \
            xargs -0 shellcheck -x -S warning -e SC1090,SC1091

      - name: shfmt
        run: |
          echo "══ Running shfmt ══"
          find . -name '*.sh' -print0 | xargs -0 shfmt -d -i 2 -ci

      - name: yamllint
        run: |
          echo "══ Running yamllint ══"
          yamllint -d relaxed .

      - name: Validate templates
        run: tests/test-templates.sh "$PWD"

      - name: Repository layout
        run: tests/test-repo-layout.sh

      - name: Package metadata and generated docs
        run: tests/test-package-metadata.sh

      - name: Install chezmoi
        run: |
          if ! command -v chezmoi &>/dev/null; then
            mkdir -p ~/.local/bin
            sh -c "$(curl -fsLS get.chezmoi.io)" -- -b ~/.local/bin
          fi

      - name: Chezmoi apply fixture
        run: tests/test-chezmoi-apply.sh "$PWD"

      - name: Interactive startup smoke
        run: tests/test-interactive-startup.sh "$PWD"

  hadolint:
    name: Dockerfile Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: .github/workflows/Dockerfile.ubuntu-24.04
          failure-threshold: warning


  cargo-tools:
    name: Cargo Tool Install Smoke
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin
            ~/.cargo/registry
            ~/.cargo/git
          key: cargo-tools-${{ runner.os }}-${{ hashFiles('packages.yaml') }}
          restore-keys: |
            cargo-tools-${{ runner.os }}-
      - name: Install cargo tools
        run: tests/test-cargo-tools.sh

  github-release-tools:
    name: GitHub Release Tool Smoke
    needs: [lint]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Download and smoke GitHub release tools
        run: tests/test-github-release-tools.sh "$PWD"

  test:
    name: Bootstrap Test (${{ matrix.profile.name }})
    needs: [gitleaks, lint, hadolint, cargo-tools, github-release-tools]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile:
          - name: ubuntu-24.04-native
            wsl: "false"
            dockerfile: .github/workflows/Dockerfile.ubuntu-24.04
          - name: ubuntu-24.04-wsl
            wsl: "true"
            dockerfile: .github/workflows/Dockerfile.ubuntu-24.04
          # Future distros:
          # - name: arch-latest
          #   wsl: "false"
          #   dockerfile: .github/workflows/Dockerfile.arch

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build test container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.profile.dockerfile }}
          tags: dotfiles-test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run bootstrap test
        run: |
          docker run --rm \
            -e DOTFILES_WSL=${{ matrix.profile.wsl }} \
            -e DOTFILES_CI=true \
            -v ${{ github.workspace }}:/dotfiles:ro \
            dotfiles-test \
            /dotfiles/tests/test-bootstrap.sh

      - name: Run idempotency test
        run: |
          docker run --rm \
            -e DOTFILES_WSL=${{ matrix.profile.wsl }} \
            -e DOTFILES_CI=true \
            -v ${{ github.workspace }}:/dotfiles:ro \
            dotfiles-test \
            /dotfiles/tests/test-idempotency.sh
