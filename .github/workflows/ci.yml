name: CI - Reliable Bootstrap

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "31 3 * * 0"
  workflow_dispatch:
    inputs:
      run_heavy_e2e:
        description: Run developer, agent, cloud, and full live installs
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  gitleaks:
    name: Secret Scan
    runs-on: ubuntu-24.04
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Scan full history and documentation
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Shell, YAML, Template, and Generated Files
    runs-on: ubuntu-24.04
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install lint tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y shellcheck yamllint tmux zsh jq yq
          go install mvdan.cc/sh/v3/cmd/shfmt@v3.13.1
          ./scripts/install-chezmoi.sh
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Shellcheck
        run: |
          find scripts tests -type f -name '*.sh' -print0 | \
            xargs -0 shellcheck -x -S warning -e SC1090,SC1091
          find dot_local/bin -type f \( -name 'executable_*' ! -name '*.tmpl' \) -print0 | \
            xargs -0 shellcheck -x -S warning -e SC1090,SC1091
      - name: shfmt
        run: |
          find scripts tests -type f -name '*.sh' -print0 | \
            xargs -0 shfmt -d -i 2 -ci
          find dot_local/bin -type f \( -name 'executable_*' ! -name '*.tmpl' \) -print0 | \
            xargs -0 shfmt -d -i 2 -ci
      - name: YAML
        run: yamllint .
      - name: Templates and repository contracts
        run: |
          tests/test-templates.sh "$PWD"
          tests/test-repo-layout.sh "$PWD"
          tests/test-bootstrap-safety.sh "$PWD"
          tests/test-package-metadata.sh "$PWD"
          tests/test-static-policy.sh "$PWD"
          tests/test-chezmoi-apply.sh "$PWD"
          tests/test-interactive-startup.sh "$PWD"

  hadolint:
    name: Dockerfile Lint
    runs-on: ubuntu-24.04
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: hadolint
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: .github/workflows/Dockerfile.ubuntu-24.04
          failure-threshold: warning

  workflow-security:
    name: Actionlint and Zizmor
    runs-on: ubuntu-24.04
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install workflow analyzers
        run: |
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          pipx install zizmor==1.26.1
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Analyze workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          actionlint
          zizmor --pedantic .

  trivy:
    name: Filesystem and Misconfiguration Scan
    runs-on: ubuntu-24.04
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Trivy repository scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-24.04
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Review dependency changes
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
      - name: Non-PR event
        if: github.event_name != 'pull_request'
        run: echo "Dependency review applies to pull requests"

  github-release-tools:
    name: Verified Release Asset Smoke
    needs: [gitleaks, lint, hadolint, workflow-security, trivy, dependency-review]
    runs-on: ubuntu-24.04
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install archive prerequisites
        run: sudo apt-get update -qq && sudo apt-get install -y curl jq
      - name: Verify upstream checksum paths
        run: |
          tests/test-github-release-tools.sh "$PWD"
          tests/test-external-tools.sh "$PWD"

  pre-matrix:
    name: Pre-Matrix Gate
    needs: [github-release-tools]
    runs-on: ubuntu-24.04
    steps:
      - run: echo "All static, security, workflow, and release-smoke gates passed"

  selectors:
    name: Selector (${{ matrix.name }})
    needs: [pre-matrix]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: minimal
            args: --profile minimal
            mode: profile
            sections: detect,core
          - name: full
            args: --profile full
            mode: profile
            sections: detect,core,zsh,terminal,languages,history,cloud,tmux,neovim,ai,media,fonts,desktop,system,theme,vscode,services
          - name: base
            args: --profile base
            mode: profile
            sections: detect,core,zsh,terminal
          - name: developer
            args: --profile developer
            mode: profile
            sections: detect,core,zsh,terminal,languages,history,tmux,neovim,system,theme,services
          - name: agent
            args: --profile agent
            mode: profile
            sections: detect,core,zsh,terminal,languages,history,tmux,neovim,ai,system,theme,services
          - name: cloud
            args: --profile cloud
            mode: profile
            sections: detect,core,zsh,terminal,languages,history,cloud,tmux,neovim,system,theme,services
          - name: custom
            args: --sections core,languages
            mode: custom
            sections: core,languages
          - name: exclusions
            args: --full --without cloud,vscode
            mode: profile
            sections: detect,core,zsh,terminal,languages,history,tmux,neovim,ai,media,fonts,desktop,system,theme,services
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate selector in clean Ubuntu
        env:
          SELECTOR_ARGS: ${{ matrix.args }}
          SELECTOR_MODE: ${{ matrix.mode }}
          SELECTOR_SECTIONS: ${{ matrix.sections }}
        run: |
          read -r -a selector_argv <<< "${SELECTOR_ARGS:-}"
          docker run --rm -v "$PWD:/dotfiles:ro" ubuntu:24.04 \
            /dotfiles/tests/test-install-selector-profile.sh \
            "${SELECTOR_MODE:?}" "${SELECTOR_SECTIONS:?}" false -- "${selector_argv[@]}"

  unit:
    name: Docker Unit (${{ matrix.platform }})
    needs: [pre-matrix]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: native
            wsl: "false"
          - platform: wsl-simulated
            wsl: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Run behavioral suite in Docker
        env:
          MATRIX_WSL: ${{ matrix.wsl }}
        run: |
          docker build -f .github/workflows/Dockerfile.ubuntu-24.04 -t dotfiles-unit .
          docker run --rm \
            -e DOTFILES_WSL="$MATRIX_WSL" \
            -v "$PWD:/dotfiles:ro" \
            dotfiles-unit bash -lc '
              set -e
              sudo apt-get update -qq
              sudo apt-get install -y yq zsh tmux
              /dotfiles/scripts/install-chezmoi.sh
              export PATH="$HOME/.local/bin:$PATH"
              for test in \
                test-environment.sh test-version-helpers.sh test-profiles.sh \
                test-secret-boundary.sh test-agent-workspace.sh test-sessionizer.sh \
                test-ownership-ledger.sh test-update-routing.sh test-recovery.sh; do
                /dotfiles/tests/$test /dotfiles
              done
            '

  base-e2e:
    name: Two-Pass Base E2E (${{ matrix.service }})
    needs: [pre-matrix, selectors, unit]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        service: [base-native, base-wsl-simulated]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Prepare artifact volume
        run: mkdir -p artifacts && chmod 0777 artifacts
      - name: Run real installer twice
        env:
          E2E_SERVICE: ${{ matrix.service }}
        run: |
          docker compose -f .github/e2e/compose.yaml --profile base \
            up --build --abort-on-container-exit \
            --exit-code-from "$E2E_SERVICE" "$E2E_SERVICE"
      - name: Upload E2E observability bundle
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: base-e2e-${{ matrix.service }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14

  recovery-e2e:
    name: Recovery and Resume E2E
    needs: [pre-matrix, unit]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Prepare artifact volume
        run: mkdir -p artifacts && chmod 0777 artifacts
      - name: Backup and restore
        run: docker compose -f .github/e2e/compose.yaml --profile recovery run --rm recovery
      - name: Inject failure and resume
        run: docker compose -f .github/e2e/compose.yaml --profile recovery run --rm failure-resume
      - name: Upload recovery logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: recovery-e2e
          path: artifacts/
          if-no-files-found: ignore
          retention-days: 14

  heavy-e2e:
    name: Live ${{ matrix.service }} E2E
    if: github.event_name == 'schedule' || inputs.run_heavy_e2e == true
    needs: [base-e2e, recovery-e2e]
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        service: [developer, agent, cloud, full]
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Prepare artifact volume
        run: mkdir -p artifacts && chmod 0777 artifacts
      - name: Run live profile
        env:
          E2E_SERVICE: ${{ matrix.service }}
        run: |
          docker compose -f .github/e2e/compose.yaml --profile "$E2E_SERVICE" \
            up --build --abort-on-container-exit \
            --exit-code-from "$E2E_SERVICE" "$E2E_SERVICE"
      - name: Upload profile logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: heavy-e2e-${{ matrix.service }}
          path: artifacts/
          if-no-files-found: warn
          retention-days: 14
