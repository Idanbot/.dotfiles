name: Real WSL E2E

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: real-wsl-e2e
  cancel-in-progress: false

jobs:
  wsl:
    name: Bootstrap on a real WSL2 host
    # A real WSL kernel requires a Windows host. Register a private runner with
    # these labels and Ubuntu-24.04 as its default WSL distribution.
    runs-on: [self-hosted, windows, x64, wsl-ubuntu-24.04]
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - name: Verify and bootstrap inside real WSL
        shell: pwsh
        env:
          CHECKOUT_WORKSPACE: ${{ github.workspace }}
        run: ./tests/e2e/test-wsl.ps1 -Workspace "$env:CHECKOUT_WORKSPACE"
      - name: Upload WSL logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: real-wsl-e2e
          path: artifacts/wsl/
          if-no-files-found: warn
          retention-days: 30
