# packages.yaml — Version-pinned tool manifest
# Update versions here, then run `chezmoi apply` to trigger upgrades
# via .chezmoiscripts/run_onchange_ scripts.

# Core CLI tools
core:
  fzf: "0.62.0"
  fd: "10.2.0"
  ripgrep: "14.1.1"
  bat: "0.25.0"
  eza: "0.21.0"
  lazygit: "0.51.1"
  btop: "1.4.0"
  starship: "1.23.0"
  jq: latest    # via apt
  yq: latest    # via apt
  htop: latest  # via apt
  zoxide: "0.9.3"
  direnv: "2.32.1"
  git-delta: "0.16.5"
  hyperfine: latest  # via apt
  duf: latest        # via apt
  sops: latest
  dust: latest       # via cargo
  xh: latest         # via cargo
  lazydocker: "0.25.2"
  tealdeer: "1.6.1"

# Languages & runtimes
languages:
  go: "1.24.3"
  rust: "stable"
  cargo: "stable"
  node_lts: "24.15.0"
  typescript: "5.9.3"
  python: "3.14.5"
  java: "21"
  uv: latest

# Editor
editor:
  neovim: "0.11.1"

# Container & Cloud
cloud:
  docker: latest  # via apt repo
  kubectl: "1.32.0"
  helm: "3.17.0"
  terraform: "1.12.0"
  ansible: latest  # via pip
  k9s: "0.40.5"
  aws_cli: "2"
  gcloud: latest
  azure_cli: latest

# Terminal
terminal:
  kitty: latest
  tmux: latest  # via apt

# Fonts
fonts:
  nerd_font: "FiraMono"
  nerd_font_version: "3.4.0"

# AI tools (optional)
ai_tools:
  claude_cli: latest
  antigravity_cli: latest
  opencode: latest

# Media (native only)
media:
  yt_dlp: latest
  rmpc: latest
  cava: latest
