# packages.yaml — Version-pinned tool manifest
# Update versions here, then run `chezmoi apply` to trigger upgrades
# via .chezmoiscripts/run_onchange_ scripts.

# Core CLI tools
core:
  fzf: "0.73.0"
  fd: "10.4.2"
  ripgrep: "15.1.0"
  bat: "0.26.1"
  eza: "0.23.4"
  lazygit: "0.61.1"
  btop: "1.4.7"
  starship: "1.25.1"
  jq: latest    # via apt
  yq: latest    # via apt
  htop: latest  # via apt
  zoxide: "0.9.9"
  direnv: "2.37.1"
  git-delta: "0.19.2"
  hyperfine: latest  # via apt
  duf: latest        # via apt
  sops: latest
  lazydocker: "0.25.2"
  tealdeer: "1.8.1"

# Languages & runtimes
languages:
  go: "1.24.3"
  rust: "stable"
  cargo: "stable"
  node_lts: "24.15.0"
  typescript: "5.9.3"
  python: "3.14.5"
  java: "21"
  uv: latest

# Editor
editor:
  neovim: "0.12.2"

# Container & Cloud
cloud:
  docker: latest  # via apt repo
  kubectl: "1.32.0"
  helm: "4.2.0"
  terraform: "1.15.4"
  ansible: latest  # via pip
  k9s: "0.50.18"
  aws_cli: "2"
  gcloud: latest
  azure_cli: latest

# Terminal
terminal:
  kitty: latest
  tmux: latest  # via apt

# Fonts
fonts:
  nerd_font: "FiraMono"
  nerd_font_version: "3.4.0"

# AI tools (optional)
ai_tools:
  claude_cli: latest
  codex_cli: latest
  antigravity_cli: latest
  opencode: latest

# Media (native only)
media:
  yt_dlp: latest
  rmpc: latest
  cava: latest
